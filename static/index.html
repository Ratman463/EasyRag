<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRag - The RAG System for Teams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css"/>
    <script src="/static/js/main.js" defer></script>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="nav-logo">
                <span class="logo-icon"></span>
                <span class="logo-text">EasyRag</span>
            </a>
        </div>
        <div class="nav-center">
            <a href="#" class="nav-link active" data-section="upload">Upload</a>
            <a href="#" class="nav-link" data-section="documents">Documents</a>
            <a href="#" class="nav-link" data-section="query">Query</a>
            <a href="#" class="nav-link" data-section="results">Results</a>
        </div>
        <div class="nav-right">
            <a href="https://github.com" class="nav-link" target="_blank">GitHub</a>
            <a href="#" class="nav-btn">Get Started</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <!-- <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">The knowledge retrieval<br>system for modern teams</h1>
            <p class="hero-subtitle">Purpose-built for document search and retrieval. Powered by vector embeddings and semantic search.</p>
            <a href="#" class="hero-cta" onclick="document.getElementById('query-input').focus(); return false;">
                <span class="cta-dot"></span>
                <span class="cta-text">Start querying your documents</span>
                <span class="cta-arrow">→</span>
            </a>
        </div>
    </section> -->

    <!-- Main Interface -->
    <main class="main-interface">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span class="logo-icon-sm"></span>
                    <span>EasyRag</span>
                    <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M3 5L6 8L9 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" title="Search" onclick="document.getElementById('query-input').focus()">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="icon-btn" title="Upload" onclick="document.getElementById('file-input').click()">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 3V11M8 3L5 6M8 3L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3 11V13H13V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="sidebar-item" data-section="upload" onclick="switchSection('upload')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2V10M8 2L5 5M8 2L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M3 10V14H13V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Upload</span>
                </a>
                <a href="#" class="sidebar-item" data-section="documents" onclick="switchSection('documents')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="3" y="2" width="10" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M6 5H10M6 8H10M6 11H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span>Documents</span>
                </a>
                <a href="#" class="sidebar-item" data-section="query" onclick="switchSection('query')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span>Query</span>
                </a>
                <a href="#" class="sidebar-item" data-section="results" onclick="switchSection('results')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8H13M3 4H13M3 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span>Results</span>
                </a>
            </nav>



            <div class="sidebar-footer">
                <div class="sidebar-status" id="sidebar-status">
                    <span class="status-dot"></span>
                    <span>Ready</span>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Upload Section -->
            <section class="content-section active" id="section-upload">
                <div class="section-header">
                    <h2 class="section-title">Upload Documents</h2>
                    <div class="section-counter" id="upload-counter"></div>
                </div>
                <div class="section-body">
                    <div class="upload-zone" id="upload-area">
                        <div class="upload-zone-content">
                            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                                <rect x="4" y="8" width="40" height="32" rx="4" stroke="#555" stroke-width="2"/>
                                <path d="M24 18V30M24 18L18 24M24 18L30 24" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <p class="upload-zone-text">Drop files here or click to browse</p>
                            <p class="upload-zone-hint">PDF, TXT, DOCX supported</p>
                        </div>
                        <input type="file" id="file-input" accept=".pdf,.txt,.docx">
                    </div>
                    <div id="upload-status"></div>
                </div>
            </section>

            <!-- Documents Section -->
            <section class="content-section" id="section-documents">
                <div class="section-header">
                    <h2 class="section-title">Document Library</h2>
                    <div class="section-counter" id="docs-counter"></div>
                </div>
                <div class="section-body">
                    <div id="documents-container">
                        <div class="empty-state">Loading documents...</div>
                    </div>
                </div>
            </section>

            <!-- Query Section -->
            <section class="content-section" id="section-query">
                <div class="section-header">
                    <h2 class="section-title">Query Knowledge Base</h2>
                    <div class="section-actions">
                        <select id="top-k" class="select-input">
                            <option value="3">Top 3</option>
                            <option value="5" selected>Top 5</option>
                            <option value="10">Top 10</option>
                        </select>
                    </div>
                </div>
                <div class="section-body">
                    <div class="query-wrapper">
                        <textarea class="query-input" id="query-input" placeholder="Ask a question about your documents..." rows="3"></textarea>
                        <button class="btn-primary" id="query-btn" onclick="queryDocuments()">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            Search
                        </button>
                    </div>
                    <p class="query-hint">Press Ctrl+Enter to search</p>
                </div>
            </section>

            <!-- Results Section -->
            <section class="content-section" id="section-results" style="display: none;">
                <div class="section-header">
                    <h2 class="section-title">Search Results</h2>
                    <div class="section-counter" id="results-counter"></div>
                </div>
                <div class="section-body">
                    <div class="results-container" id="results-container"></div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <!-- <footer class="footer">
        <span>EasyRag</span>
        <span class="footer-sep">·</span>
        <span>Built with FastAPI & sqlite-vec</span>
    </footer> -->
</body>
</html>
